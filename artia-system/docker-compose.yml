version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: artia-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: artia
    volumes:
      - mongodb_data:/data/db
    networks:
      - artia-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artia-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/artia
      - PORT=3000
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - artia-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: artia-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - artia-network

volumes:
  mongodb_data:

networks:
  artia-network:
    driver: bridge
